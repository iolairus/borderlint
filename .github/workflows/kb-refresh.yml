name: kb-refresh
on:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: drift
        run: |
          python3 scripts/kb_drift.py > gap.txt || true
          echo "count=$(wc -l < gap.txt)" >> "$GITHUB_OUTPUT"
      - if: steps.drift.outputs.count != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const gap = fs.readFileSync('gap.txt', 'utf8').trim();
            if (!gap) return;
            const body = [
              'Upstream providers not yet covered by the borderlint KB.',
              'Assign endpoint host(s) and a jurisdiction **by hand** — do not auto-merge.',
              '', '```', gap, '```',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'KB drift: new upstream providers to review', body,
            });
