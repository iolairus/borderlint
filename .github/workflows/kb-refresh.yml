name: kb-refresh
on:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: drift
        run: |
          python3 scripts/kb_drift.py > report.md
          echo "bytes=$(wc -c < report.md)" >> "$GITHUB_OUTPUT"
      - if: steps.drift.outputs.bytes != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8').trim();
            if (!body) return;
            const title = 'KB freshness: items to review';
            // Persistent conditions (e.g. staleness) recur weekly: update the open
            // issue instead of opening a duplicate every Monday.
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', per_page: 100,
            });
            const existing = open.data.find(i => i.title === title && !i.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body,
              });
            }
